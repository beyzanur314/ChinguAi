<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chingu AI - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-chingu {
            background: #a855f7;
            color: white;
            border: none;
            transition: background 0.3s ease;
        }
        .btn-chingu:hover {
            background: #9333ea;
            color: white;
        }
        .btn-google {
            background: #fff;
            color: #333;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
        }
        .btn-google:hover {
            background: #f1f1f1;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: rgba(255,255,255,0.4);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h2 class="mb-4" style="color: #c084fc; font-weight: 700;">Chingu AI</h2>
    <p class="text-white-50 mb-4">Geliştirici Asistanına Hoş Geldiniz</p>

    <form th:action="@{/login}" method="post" class="text-start">
        <div class="mb-3">
            <label class="form-label text-white-50">Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;" required>
        </div>
        <div class="mb-4">
            <label class="form-label text-white-50">Şifre</label>
            <input type="password" name="password" class="form-control" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;" required>
        </div>
        <button type="submit" class="btn btn-chingu w-100 py-2 rounded-3 mb-3">Giriş Yap</button>
    </form>

    <div class="divider">veya</div>

    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 py-2 rounded-3">
        <img src="https://docs.gcom.cloud/images/public/logos/google-g-logo.svg" alt="Google" style="width: 18px;">
        Google ile Giriş Yap
    </a>
</div>

</body>
</html>

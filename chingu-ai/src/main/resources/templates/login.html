<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chingu AI - Giriş Yap</title>
    <style>
        body {
            background: #0f0e17;
            color: #fffffe;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #16161e;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { color: #6c5ce7; margin-bottom: 30px; }
        .google-btn {
            background: white;
            color: #333;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .google-btn:hover { background: #f0f0f0; }
        .google-icon { width: 20px; height: 20px; }
    </style>
</head>
<body>
<div class="login-container">
    <h1>🤖 Chingu AI</h1>
    <p>Sohbet Etmek İçin Giriş Yap</p>

    <form action="/oauth2/authorization/google" method="get">
        <button type="submit" class="google-btn">
            🔵 Google ile Giriş Yap
        </button>
    </form>
</div>
</body>
</html>
